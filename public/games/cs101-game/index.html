<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shape Runner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// ---- Constants ----
const W = 400, H = 600;
const LAYERS = 8;
const LAYER_H = H / LAYERS;
const PLAYER_X = 80;
const PLAYER_SIZE = 38;
const WALL_WIDTH = 48;
const WALL_SPEED_BASE = 2.15;
const WALL_SPEED_GROWTH = 0.07;
const RESPAWN_DELAY_FRAMES = 12;
const GRAVITY = 0.55;
const JUMP_FORCE = -10;
const BLACK_CHANCE = 0;
const INTRO_STORAGE_KEY = "shape-runner-intro-hidden-v1";
const COUNTDOWN_FRAMES = 180;

// ---- Explicit mode/obstacle contracts ----
const PLAYER_MODE = {
  CIRCLE: 0,
  SQUARE: 1,
  TRIANGLE: 2
};

const OBSTACLE_TYPE = {
  CIRCLE_BLOCKER: 0,
  SQUARE_BLOCKER: 1,
  TRIANGLE_BLOCKER: 2
};

const MODE_ORDER = [PLAYER_MODE.CIRCLE, PLAYER_MODE.SQUARE, PLAYER_MODE.TRIANGLE];
const MODE_NAMES = ["CIRCLE", "SQUARE", "TRIANGLE"];
const OBSTACLE_NAMES = ["CIRCLE BLOCKER", "SQUARE BLOCKER", "TRIANGLE BLOCKER"];
const COLORS = {
  green: [30, 180, 60],
  blue: [50, 80, 220],
  red: [210, 40, 40],
  black: [0, 0, 0]
};

const BLOCK_RULES = {
  [OBSTACLE_TYPE.CIRCLE_BLOCKER]: { circle: true, square: false, triangle: false },
  [OBSTACLE_TYPE.SQUARE_BLOCKER]: { circle: false, square: true, triangle: false },
  [OBSTACLE_TYPE.TRIANGLE_BLOCKER]: { circle: false, square: false, triangle: true }
};

// ---- Game state ----
let playerY, playerMode, velocityY, squareLayer;
let walls, score, highScore, gameOver, wallTimer, scrollSpeed;
let introOpen = true;
let introDontShow = false;
let switchFx = { active: false, t: 0, duration: 16, color: [255, 255, 255], particles: [] };
let nextObstacleType = 0;
let goalTarget = 20;
let paused = false;
let showGrid = true;
let goalFlash = 0;
let scorePop = 0;
let scorePopText = "";
let cameraFx = { shake: 0, zoom: 0, nearMissCooldown: 0 };
let failFx = { active: false, t: 0, duration: 14, x: 0, y: 0, color: [255, 255, 255], particles: [] };
let failDelayFrames = 0;
let uiButtons = { pause: null };
let countdownFrames = COUNTDOWN_FRAMES;
let muted = false;
let audioCtx = null;
let usingDomKeyEvents = false;
let gameCanvas = null;

function modeToObstacleType(mode) {
  if (mode === PLAYER_MODE.CIRCLE) return OBSTACLE_TYPE.CIRCLE_BLOCKER;
  if (mode === PLAYER_MODE.SQUARE) return OBSTACLE_TYPE.SQUARE_BLOCKER;
  return OBSTACLE_TYPE.TRIANGLE_BLOCKER;
}

function modeColor(mode) {
  if (mode === PLAYER_MODE.CIRCLE) return COLORS.green;
  if (mode === PLAYER_MODE.SQUARE) return COLORS.blue;
  return COLORS.red;
}

function makeBrick(layer, obstacleType, forceBlack = false) {
  const isBlack = forceBlack || random() < BLACK_CHANCE;
  if (isBlack) {
    return {
      layer,
      color: COLORS.black,
      blocks: { circle: true, square: true, triangle: true },
      obstacleType
    };
  }

  const color =
    obstacleType === OBSTACLE_TYPE.CIRCLE_BLOCKER ? COLORS.green :
    obstacleType === OBSTACLE_TYPE.SQUARE_BLOCKER ? COLORS.blue : COLORS.red;

  return {
    layer,
    color,
    blocks: { ...BLOCK_RULES[obstacleType] },
    obstacleType
  };
}

function spawnCircleObstacle() {
  const bricks = [];
  const gapStart = floor(random(0, LAYERS - 3));
  for (let i = 0; i < LAYERS; i++) {
    if (i === gapStart || i === gapStart + 1 || i === gapStart + 2) continue;
    bricks.push(makeBrick(i, OBSTACLE_TYPE.CIRCLE_BLOCKER));
  }
  return { type: OBSTACLE_TYPE.CIRCLE_BLOCKER, bricks };
}

function spawnSquareObstacle() {
  const bricks = [];
  const gapLayer = floor(random(LAYERS));
  for (let i = 0; i < LAYERS; i++) {
    if (i === gapLayer) continue;
    bricks.push(makeBrick(i, OBSTACLE_TYPE.SQUARE_BLOCKER));
  }
  return { type: OBSTACLE_TYPE.SQUARE_BLOCKER, bricks };
}

function spawnTriangleObstacle() {
  // Middle layers are always blocked. Openings are top, bottom, or both.
  const bricks = [];
  const openingMode = floor(random(3)); // 0=top, 1=bottom, 2=both
  const openTop = openingMode === 0 || openingMode === 2;
  const openBottom = openingMode === 1 || openingMode === 2;
  for (let i = 0; i < LAYERS; i++) {
    if ((i === 0 && openTop) || (i === LAYERS - 1 && openBottom)) continue;
    bricks.push(makeBrick(i, OBSTACLE_TYPE.TRIANGLE_BLOCKER));
  }
  return { type: OBSTACLE_TYPE.TRIANGLE_BLOCKER, bricks };
}

function spawnWall() {
  const obstacleType = nextObstacleType;
  nextObstacleType = floor(random(3));
  const obstacle =
    obstacleType === OBSTACLE_TYPE.CIRCLE_BLOCKER ? spawnCircleObstacle() :
    obstacleType === OBSTACLE_TYPE.SQUARE_BLOCKER ? spawnSquareObstacle() :
    spawnTriangleObstacle();

  walls.push({
    x: W + 10,
    entered: false,
    scored: false,
    type: obstacle.type,
    bricks: obstacle.bricks
  });
}

function reset() {
  playerY = H / 2;
  playerMode = PLAYER_MODE.CIRCLE;
  velocityY = 0;
  squareLayer = 3;
  walls = [];
  score = 0;
  goalTarget = 20;
  paused = false;
  goalFlash = 0;
  scorePop = 0;
  scorePopText = "";
  countdownFrames = COUNTDOWN_FRAMES;
  nextObstacleType = floor(random(3));
  gameOver = false;
  scrollSpeed = WALL_SPEED_BASE;
  wallTimer = 0;
  cameraFx = { shake: 0, zoom: 0, nearMissCooldown: 0 };
  failFx = { active: false, t: 0, duration: 14, x: 0, y: 0, color: [255, 255, 255], particles: [] };
  failDelayFrames = 0;
  switchFx = { active: false, t: 0, duration: 16, color: modeColor(PLAYER_MODE.CIRCLE), particles: [] };
}

function setup() {
  gameCanvas = createCanvas(W, H);
  gameCanvas.elt.tabIndex = 0;
  gameCanvas.elt.setAttribute("aria-label", "Shape Runner game canvas");
  gameCanvas.elt.focus();
  gameCanvas.elt.addEventListener("pointerdown", () => gameCanvas.elt.focus());
  highScore = 0;
  introOpen = localStorage.getItem(INTRO_STORAGE_KEY) !== "1";
  introDontShow = false;
  reset();
  textFont('monospace');
  if (!usingDomKeyEvents) {
    window.addEventListener("keydown", (e) => {
      const handled = handleKeyInput(e.key, e.keyCode || e.which);
      if (handled) e.preventDefault();
    }, { passive: false });
    usingDomKeyEvents = true;
  }
}

function ensureAudio() {
  if (muted) return null;
  if (!audioCtx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    audioCtx = new Ctx();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playCue(type) {
  const ctx = ensureAudio();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "triangle";

  if (type === "switch") osc.frequency.setValueAtTime(540, ctx.currentTime);
  else if (type === "score") osc.frequency.setValueAtTime(700, ctx.currentTime);
  else osc.frequency.setValueAtTime(170, ctx.currentTime);

  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.05, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (type === "fail" ? 0.16 : 0.1));

  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + (type === "fail" ? 0.16 : 0.1));
}

function triggerNearMissFx() {
  cameraFx.shake = max(cameraFx.shake, 1.2);
  cameraFx.zoom = max(cameraFx.zoom, 0.004);
  cameraFx.nearMissCooldown = 8;
}

function triggerFailFx() {
  cameraFx.shake = 4;
  cameraFx.zoom = 0.018;
  playCue("fail");
}

function startFail() {
  if (gameOver || failDelayFrames > 0) return;
  failDelayFrames = 18;
  const c = modeColor(playerMode);
  failFx = {
    active: true,
    t: 0,
    duration: 16,
    x: PLAYER_X,
    y: playerY,
    color: c,
    particles: []
  };
  for (let i = 0; i < 22; i++) {
    const a = random(TWO_PI);
    const speed = random(1.8, 4.6);
    failFx.particles.push({
      x: PLAYER_X,
      y: playerY,
      vx: cos(a) * speed,
      vy: sin(a) * speed - random(0.3, 1.4),
      r: random(2.2, 5.4)
    });
  }
  triggerFailFx();
}

function updateEffects() {
  cameraFx.shake *= 0.86;
  cameraFx.zoom *= 0.84;
  cameraFx.nearMissCooldown = max(0, cameraFx.nearMissCooldown - 1);
  goalFlash = max(0, goalFlash - 1);
  scorePop = max(0, scorePop - 1);
  if (failDelayFrames > 0) {
    failDelayFrames--;
    if (failDelayFrames === 0) gameOver = true;
  }
}

function getCameraTransform() {
  const amp = cameraFx.shake;
  return {
    x: amp > 0.05 ? random(-amp, amp) : 0,
    y: amp > 0.05 ? random(-amp, amp) : 0,
    scale: 1 + cameraFx.zoom
  };
}

function updatePlayer() {
  if (playerMode === PLAYER_MODE.CIRCLE) {
    velocityY += GRAVITY;
    playerY += velocityY;
    playerY = constrain(playerY, PLAYER_SIZE / 2, H - PLAYER_SIZE / 2);
  } else if (playerMode === PLAYER_MODE.SQUARE) {
    const targetY = (squareLayer + 0.5) * LAYER_H;
    playerY = lerp(playerY, targetY, 0.25);
  }
  // Triangle stays where key input puts it.
}

function updateWallsAndScore() {
  const playerFrontX = PLAYER_X + PLAYER_SIZE / 2;
  const playerBackX = PLAYER_X - PLAYER_SIZE / 2;

  for (let w of walls) w.x -= scrollSpeed;
  walls = walls.filter(w => w.x + WALL_WIDTH > -10);

  for (let w of walls) {
    // Enforce shape/obstacle match when entering obstacle column.
    if (!w.entered && w.x <= playerFrontX) {
      w.entered = true;
      if (w.type !== modeToObstacleType(playerMode)) {
        startFail();
        return;
      }
    }

    if (!w.scored && w.x + WALL_WIDTH < playerBackX) {
      score += 1;
      playCue("score");
      scorePop = 30;
      scorePopText = "+1";
      while (score >= goalTarget) {
        goalTarget += 20;
        goalFlash = 40;
      }
      if (score > highScore) highScore = score;
      w.scored = true;
    }
  }
}

function updateGame() {
  scrollSpeed = WALL_SPEED_BASE + score * WALL_SPEED_GROWTH;
  updatePlayer();

  updateWallsAndScore();
  if (walls.length === 0) {
    if (wallTimer <= 0) {
      spawnWall();
      wallTimer = RESPAWN_DELAY_FRAMES;
    } else {
      wallTimer--;
    }
  }

  if (checkCollision()) {
    startFail();
  }
}

function checkCollision() {
  const py = playerY;
  const pr = PLAYER_SIZE / 2;
  const modeKey =
    playerMode === PLAYER_MODE.CIRCLE ? "circle" :
    playerMode === PLAYER_MODE.SQUARE ? "square" : "triangle";

  for (let w of walls) {
    if (w.x > PLAYER_X + pr + 5 || w.x + WALL_WIDTH < PLAYER_X - pr - 5) continue;

    for (let b of w.bricks) {
      const bTop = b.layer * LAYER_H;
      const bBot = bTop + LAYER_H;
      const noVerticalOverlap = py - pr >= bBot || py + pr <= bTop;
      if (noVerticalOverlap) {
        if (b.blocks[modeKey] && cameraFx.nearMissCooldown <= 0) {
          const nearTop = abs((py - pr) - bBot) <= 4;
          const nearBottom = abs((py + pr) - bTop) <= 4;
          if (nearTop || nearBottom) triggerNearMissFx();
        }
        continue;
      }
      if (b.blocks[modeKey]) return true;
    }
  }

  return false;
}

function drawWalls() {
  noStroke();
  for (let w of walls) {
    for (let b of w.bricks) {
      fill(b.color[0], b.color[1], b.color[2]);
      rect(w.x, b.layer * LAYER_H + 1, WALL_WIDTH, LAYER_H - 2, 3);
    }
  }
}

function drawPlayer() {
  if (failDelayFrames > 0) return;
  const px = PLAYER_X;
  const py = playerY;
  const s = PLAYER_SIZE;
  noStroke();

  if (playerMode === PLAYER_MODE.CIRCLE) {
    fill(COLORS.green[0], COLORS.green[1], COLORS.green[2]);
    ellipse(px, py, s, s);
  } else if (playerMode === PLAYER_MODE.SQUARE) {
    fill(COLORS.blue[0], COLORS.blue[1], COLORS.blue[2]);
    rectMode(CENTER);
    rect(px, py, s, s, 4);
    rectMode(CORNER);
  } else {
    const onRoof = py <= PLAYER_SIZE + 1;
    push();
    translate(px, py);
    if (onRoof) rotate(PI);
    fill(COLORS.red[0], COLORS.red[1], COLORS.red[2]);
    triangle(-s / 2, s / 2, s / 2, s / 2, 0, -s / 2);
    pop();
  }
}

function drawObstacleIcon(cx, cy, type, size = 10) {
  noStroke();
  if (type === OBSTACLE_TYPE.CIRCLE_BLOCKER) {
    fill(COLORS.green[0], COLORS.green[1], COLORS.green[2]);
    ellipse(cx, cy, size, size);
  } else if (type === OBSTACLE_TYPE.SQUARE_BLOCKER) {
    fill(COLORS.blue[0], COLORS.blue[1], COLORS.blue[2]);
    rectMode(CENTER);
    rect(cx, cy, size, size, 2);
    rectMode(CORNER);
  } else {
    fill(COLORS.red[0], COLORS.red[1], COLORS.red[2]);
    triangle(cx - size / 2, cy + size / 2, cx + size / 2, cy + size / 2, cx, cy - size / 2);
  }
}

function drawHUD() {
  noStroke();
  uiButtons.pause = { x: 10, y: 8, w: 54, h: 20 };
  uiButtons.up = { x: W - 48, y: H - 86, w: 36, h: 30 };
  uiButtons.down = { x: W - 48, y: H - 48, w: 36, h: 30 };

  fill(255, 255, 255, 22);
  rect(uiButtons.pause.x, uiButtons.pause.y, uiButtons.pause.w, uiButtons.pause.h, 5);
  fill(235);
  textAlign(CENTER, CENTER);
  textSize(10);
  text("PAUSE", uiButtons.pause.x + uiButtons.pause.w / 2, uiButtons.pause.y + 11);

  textAlign(CENTER);
  textSize(28);
  fill(255, 245);
  text(score, W / 2, 34);
  if (scorePop > 0 && scorePopText) {
    fill(240, 255, 240, map(scorePop, 0, 30, 0, 255));
    textSize(12);
    text(scorePopText, W / 2 + 28, 18);
  }

  textAlign(RIGHT);
  textSize(10);
  fill(170, 170, 170, 215);
  text("BEST " + highScore, W - 10, 16);

  const stateText = gameOver ? "GAME OVER" : (countdownFrames > 0 ? "READY" : "FLOW");
  textAlign(CENTER, CENTER);
  textSize(10);
  fill(185, 185, 185, 210);
  text(stateText, W / 2, 52);

  const chipX = W - 86;
  const chipY = 30;
  fill(255, 255, 255, 20);
  rect(chipX, chipY, 76, 24, 6);
  fill(210);
  textAlign(LEFT, CENTER);
  textSize(9);
  text("NEXT", chipX + 6, chipY + 12);
  drawObstacleIcon(chipX + 58, chipY + 12, nextObstacleType, 11);

  fill(goalFlash > 0 ? color(255, 244, 170) : color(180, 180, 180, 230));
  textAlign(LEFT, CENTER);
  textSize(10);
  text(`Goal ${min(score, goalTarget)}/${goalTarget}`, 10, H - 14);

  if (highScore > 0) {
    const gx = W - 4;
    const gy0 = 62;
    const gy1 = H - 24;
    stroke(255, 255, 255, 28);
    line(gx, gy0, gx, gy1);
    const ratio = constrain(score / highScore, 0, 1);
    const gy = lerp(gy1, gy0, ratio);
    stroke(255, 255, 255, 95);
    line(gx - 4, gy, gx + 1, gy);
    noStroke();
  }

  fill(255, 255, 255, 22);
  rect(uiButtons.up.x, uiButtons.up.y, uiButtons.up.w, uiButtons.up.h, 6);
  rect(uiButtons.down.x, uiButtons.down.y, uiButtons.down.w, uiButtons.down.h, 6);
  fill(235);
  textAlign(CENTER, CENTER);
  textSize(15);
  text("▲", uiButtons.up.x + uiButtons.up.w / 2, uiButtons.up.y + uiButtons.up.h / 2 + 1);
  text("▼", uiButtons.down.x + uiButtons.down.w / 2, uiButtons.down.y + uiButtons.down.h / 2 + 1);
}

function drawPauseMenu() {
  fill(0, 0, 0, 165);
  rect(0, 0, W, H);

  const panelW = 260;
  const panelH = 272;
  const panelX = (W - panelW) / 2;
  const panelY = (H - panelH) / 2;
  fill(18, 22, 34, 240);
  rect(panelX, panelY, panelW, panelH, 10);

  fill(240);
  textAlign(CENTER, CENTER);
  textSize(24);
  text("PAUSED", W / 2, panelY + 34);

  const bw = 212;
  const bh = 42;
  const bx = W / 2 - bw / 2;
  const y1 = panelY + 60;
  const gap = 10;
  uiButtons.pauseResume = { x: bx, y: y1, w: bw, h: bh };
  uiButtons.pauseRestart = { x: bx, y: y1 + (bh + gap), w: bw, h: bh };
  uiButtons.pauseSound = { x: bx, y: y1 + 2 * (bh + gap), w: bw, h: bh };
  uiButtons.pauseGrid = { x: bx, y: y1 + 3 * (bh + gap), w: bw, h: bh };

  fill(255, 255, 255, 24);
  rect(uiButtons.pauseResume.x, uiButtons.pauseResume.y, bw, bh, 8);
  rect(uiButtons.pauseRestart.x, uiButtons.pauseRestart.y, bw, bh, 8);
  rect(uiButtons.pauseSound.x, uiButtons.pauseSound.y, bw, bh, 8);
  rect(uiButtons.pauseGrid.x, uiButtons.pauseGrid.y, bw, bh, 8);

  fill(245);
  textSize(13);
  text("Resume", W / 2, uiButtons.pauseResume.y + bh / 2 + 1);
  text("Restart Run", W / 2, uiButtons.pauseRestart.y + bh / 2 + 1);
  text(muted ? "Sound: Off" : "Sound: On", W / 2, uiButtons.pauseSound.y + bh / 2 + 1);
  text(showGrid ? "Grid: On" : "Grid: Off", W / 2, uiButtons.pauseGrid.y + bh / 2 + 1);
}

function drawSwitchFx() {
  if (!switchFx.active) return;

  const progress = switchFx.t / switchFx.duration;
  const inv = 1 - progress;
  const px = PLAYER_X;
  const py = playerY;
  const ringR = 14 + progress * 34;

  noFill();
  strokeWeight(2);
  stroke(switchFx.color[0], switchFx.color[1], switchFx.color[2], 190 * inv);
  ellipse(px, py, ringR * 2, ringR * 2);

  noStroke();
  for (let p of switchFx.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    fill(switchFx.color[0], switchFx.color[1], switchFx.color[2], 190 * inv);
    circle(p.x, p.y, p.r);
  }

  switchFx.t += 1;
  if (switchFx.t >= switchFx.duration) {
    switchFx.active = false;
    switchFx.particles = [];
  }
}

function drawFailFx() {
  if (!failFx.active) return;
  const progress = failFx.t / failFx.duration;
  const inv = 1 - progress;

  noFill();
  strokeWeight(2);
  stroke(failFx.color[0], failFx.color[1], failFx.color[2], 180 * inv);
  const ring = 8 + progress * 34;
  ellipse(failFx.x, failFx.y, ring, ring);

  noStroke();
  for (let p of failFx.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy = p.vy * 0.95 + 0.04;
    fill(failFx.color[0], failFx.color[1], failFx.color[2], 210 * inv);
    circle(p.x, p.y, p.r * inv);
  }

  failFx.t += 1;
  if (failFx.t >= failFx.duration) {
    failFx.active = false;
    failFx.particles = [];
  }
}


function drawGameOver() {
  fill(0, 0, 0, 170);
  rect(0, 0, W, H);
  textAlign(CENTER);
  textSize(34);
  fill(255);
  text("GAME OVER", W / 2, H / 2 - 40);
  textSize(15);
  fill(180);
  text("Score: " + score, W / 2, H / 2);
  textSize(12);
  fill(130);
  text("Press TAB", W / 2, H / 2 + 96);

  const rw = 148, rh = 44;
  uiButtons.retry = { x: W / 2 - rw / 2, y: H / 2 + 34, w: rw, h: rh };
  fill(245, 245, 245, 36);
  rect(uiButtons.retry.x, uiButtons.retry.y, uiButtons.retry.w, uiButtons.retry.h, 8);
  fill(246);
  textSize(14);
  text("Retry", W / 2, uiButtons.retry.y + rh / 2 + 1);
}

function drawIntro() {
  fill(0, 0, 0, 185);
  rect(0, 0, W, H);

  const panelX = 22;
  const panelY = 72;
  const panelW = W - 44;
  const panelH = 356;

  noStroke();
  fill(18, 22, 34, 235);
  rect(panelX, panelY, panelW, panelH, 10);

  textAlign(LEFT);
  fill(235);
  textSize(16);
  text("Shape Runner: 3 modes in 1", panelX + 14, panelY + 28);

  textSize(12);
  fill(175);
  text("Switch shapes to match incoming obstacle families.", panelX + 14, panelY + 50);

  fill(210);
  text("- Circle: flappy-style gravity + jump", panelX + 14, panelY + 82);
  text("- Square: grid/layer snapping", panelX + 14, panelY + 104);
  text("- Triangle: top/bottom lane snaps", panelX + 14, panelY + 126);

  fill(170);
  text("Obstacle rules:", panelX + 14, panelY + 156);
  fill(210);
  text("Green\u2192Circle  Blue\u2192Square  Red\u2192Triangle", panelX + 14, panelY + 176);
  fill(170);
  text("Wrong match = fail  |  SPACE switch  |  \u2191 \u2193 move", panelX + 14, panelY + 198);

  const checkbox = getIntroCheckboxRect();
  const startBtn = getIntroStartButtonRect();

  stroke(165);
  strokeWeight(1);
  noFill();
  rect(checkbox.x, checkbox.y, checkbox.s, checkbox.s, 3);
  if (introDontShow) {
    noStroke();
    fill(235);
    rect(checkbox.x + 3, checkbox.y + 3, checkbox.s - 6, checkbox.s - 6, 2);
  }

  noStroke();
  fill(200);
  textSize(11);
  text("Don't show again", checkbox.x + checkbox.s + 8, checkbox.y + checkbox.s - 2);

  fill(34, 108, 200);
  rect(startBtn.x, startBtn.y, startBtn.w, startBtn.h, 7);
  fill(248);
  textAlign(CENTER, CENTER);
  textSize(13);
  text("START", startBtn.x + startBtn.w / 2, startBtn.y + startBtn.h / 2 + 1);
}

function getIntroCheckboxRect() {
  return { x: 40, y: 382, s: 20 };
}

function getIntroStartButtonRect() {
  return { x: W / 2 - 84, y: 416, w: 168, h: 44 };
}

function draw() {
  background(15, 15, 25);
  updateEffects();
  if (!introOpen && !gameOver && !paused && failDelayFrames === 0) {
    if (countdownFrames > 0) {
      countdownFrames--;
    } else {
      updateGame();
    }
  }

  const cam = getCameraTransform();
  push();
  translate(W / 2, H / 2);
  scale(cam.scale);
  translate(-W / 2 + cam.x, -H / 2 + cam.y);
  if (showGrid) {
    stroke(255, 255, 255, 18);
    strokeWeight(1);
    for (let i = 1; i < LAYERS; i++) line(0, i * LAYER_H, W, i * LAYER_H);
  }
  drawWalls();
  drawPlayer();
  drawFailFx();
  drawSwitchFx();
  pop();

  drawHUD();
  if (paused && !gameOver && !introOpen) {
    drawPauseMenu();
  }
  if (countdownFrames > 0 && !introOpen && !gameOver) {
    fill(0, 0, 0, 95);
    rect(0, 0, W, H);
    fill(242);
    textAlign(CENTER, CENTER);
    textSize(44);
    text(String(max(1, ceil(countdownFrames / 60))), W / 2, H / 2);
  }
  if (gameOver) drawGameOver();
  if (introOpen) drawIntro();
}

function cycleMode() {
  const idx = MODE_ORDER.indexOf(playerMode);
  playerMode = MODE_ORDER[(idx + 1) % MODE_ORDER.length];
  velocityY = 0;
  if (playerMode === PLAYER_MODE.TRIANGLE) playerY = H - PLAYER_SIZE;
  if (playerMode === PLAYER_MODE.SQUARE) squareLayer = floor(constrain(playerY / LAYER_H, 0, LAYERS - 1));
  playCue("switch");

  const c = modeColor(playerMode);
  switchFx.active = true;
  switchFx.t = 0;
  switchFx.duration = 16;
  switchFx.color = c;
  switchFx.particles = [];
  for (let i = 0; i < 14; i++) {
    const a = random(TWO_PI);
    const sp = random(1.2, 2.9);
    switchFx.particles.push({
      x: PLAYER_X,
      y: playerY,
      vx: cos(a) * sp,
      vy: sin(a) * sp,
      r: random(2.2, 4.4)
    });
  }
}

function applyUpInput() {
  if (playerMode === PLAYER_MODE.CIRCLE) {
    velocityY = JUMP_FORCE;
  }
  if (playerMode === PLAYER_MODE.SQUARE) {
    squareLayer = max(0, squareLayer - 1);
  }
  if (playerMode === PLAYER_MODE.TRIANGLE) {
    playerY = PLAYER_SIZE;
  }
}

function applyDownInput() {
  if (playerMode === PLAYER_MODE.CIRCLE) {
    velocityY = abs(JUMP_FORCE) * 0.65;
  }
  if (playerMode === PLAYER_MODE.SQUARE) {
    squareLayer = min(LAYERS - 1, squareLayer + 1);
  }
  if (playerMode === PLAYER_MODE.TRIANGLE) {
    playerY = H - PLAYER_SIZE;
  }
}

function handleKeyInput(k, code) {
  if (code === 9) {
    if (!introOpen) reset();
    return true;
  }

  if (introOpen) return false;

  if (gameOver) return false;
  if (failDelayFrames > 0) return false;

  if (k === "p" || k === "P") {
    paused = !paused;
    return true;
  }
  if (k === "m" || k === "M") {
    muted = !muted;
    return true;
  }

  if (paused) return false;
  if (countdownFrames > 0) return false;

  if (code === 32) {
    cycleMode();
    return true;
  }

  if (code === UP_ARROW || k === "w" || k === "W") {
    applyUpInput();
    return true;
  }
  if (code === DOWN_ARROW || k === "s" || k === "S") {
    applyDownInput();
    return true;
  }
  return false;
}

function keyPressed() {
  // DOM keydown listener is the primary path. Avoid double-handling
  // the same key in p5's keyPressed callback.
  if (usingDomKeyEvents) return false;
  const handled = handleKeyInput(key, keyCode);
  if (handled) return false;
}

function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function mousePressed() {
  if (!introOpen) {
    if (failDelayFrames > 0) return false;
    if (pointInRect(mouseX, mouseY, uiButtons.pause)) {
      paused = !paused;
      return false;
    }
    if (paused && !gameOver) {
      if (uiButtons.pauseResume && pointInRect(mouseX, mouseY, uiButtons.pauseResume)) {
        paused = false;
        return false;
      }
      if (uiButtons.pauseRestart && pointInRect(mouseX, mouseY, uiButtons.pauseRestart)) {
        reset();
        return false;
      }
      if (uiButtons.pauseSound && pointInRect(mouseX, mouseY, uiButtons.pauseSound)) {
        muted = !muted;
        return false;
      }
      if (uiButtons.pauseGrid && pointInRect(mouseX, mouseY, uiButtons.pauseGrid)) {
        showGrid = !showGrid;
        return false;
      }
      return false;
    }
    if (!paused && !gameOver && pointInRect(mouseX, mouseY, uiButtons.up)) {
      applyUpInput();
      return false;
    }
    if (!paused && !gameOver && pointInRect(mouseX, mouseY, uiButtons.down)) {
      applyDownInput();
      return false;
    }
    if (gameOver && uiButtons.retry && pointInRect(mouseX, mouseY, uiButtons.retry)) {
      reset();
      return false;
    }
    return false;
  }

  const checkbox = getIntroCheckboxRect();
  const startBtn = getIntroStartButtonRect();
  const checkboxRect = { x: checkbox.x, y: checkbox.y, w: checkbox.s, h: checkbox.s };

  if (pointInRect(mouseX, mouseY, checkboxRect)) {
    introDontShow = !introDontShow;
    return;
  }

  if (pointInRect(mouseX, mouseY, startBtn)) {
    introOpen = false;
    if (introDontShow) localStorage.setItem(INTRO_STORAGE_KEY, "1");
  }
  return false;
}

function touchStarted() {
  return mousePressed();
}
</script>
